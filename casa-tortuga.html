<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Casa Tortuga — Gartengestaltung</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #eee; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; height: 100vh; }

#map-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#map-container {
  position: relative;
  display: inline-block;
  line-height: 0;
}

#map-img {
  display: block;
  max-width: 100vw;
  max-height: 100vh;
  object-fit: contain;
}

.marker {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: transform 0.15s;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
}
.marker:hover { transform: translate(-50%, -50%) scale(1.25); }

/* Modal */
#modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px;
  overflow-y: auto;
}
#modal.open { display: flex; }

#modal-header {
  width: 100%; max-width: 1400px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
  flex-shrink: 0;
}
#modal-title { font-size: 22px; font-weight: bold; color: #fff; }
#modal-close {
  background: rgba(255,255,255,0.1); border: 2px solid #fff; color: #fff;
  font-size: 22px; width: 52px; height: 52px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#modal-close:hover { background: rgba(255,255,255,0.25); }
#modal-back {
  margin: 24px auto 8px auto;
  padding: 12px 28px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 15px; border-radius: 8px;
  cursor: pointer; display: block;
}
#modal-back:hover { background: rgba(255,255,255,0.22); }

#photo-grid {
  width: 100%; max-width: 1400px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
#photo-grid img {
  width: 100%; height: 220px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.15s;
  background: #222;
}
#photo-grid img:hover { transform: scale(1.03); }

/* Lightbox */
#lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.97);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }
#lightbox-close {
  position: fixed; top: 16px; right: 20px;
  background: rgba(0,0,0,0.7); border: 2px solid #fff; color: #fff;
  font-size: 24px; width: 52px; height: 52px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 300; box-shadow: 0 2px 12px rgba(0,0,0,0.8);
}
#lightbox-close:hover { background: rgba(255,255,255,0.2); }

/* Hint */
#hint {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  color: #ccc; font-size: 13px;
  padding: 6px 14px; border-radius: 20px;
  pointer-events: none;
  white-space: nowrap;
}

/* Area description */
.area-description {
  grid-column: 1/-1;
  color: #bbb;
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.04);
  border-left: 3px solid #2e7d32;
  border-radius: 0 8px 8px 0;
}

/* Mood Banner */
.mood-banner {
  grid-column: 1/-1;
  margin-bottom: 20px;
}
.mood-label {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 8px;
}
.mood-layout {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.mood-hero-wrap {
  position: relative;
}
.mood-hero-wrap::after {
  content: 'REFERENZ & STIMMUNG';
  display: block;
  margin-top: 16px;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 2px;
  color: #444;
}
.mood-strip-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  border-radius: 8px;
  overflow: hidden;
}
.mood-hero {
  width: 100%;
  height: 300px;
  object-fit: cover;
  cursor: pointer;
  display: block;
  border-radius: 8px;
  transition: filter 0.3s;
  filter: brightness(0.9);
}
.mood-hero:hover { filter: brightness(1.05); }
.mood-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.mood-strip img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 6px;
  transition: filter 0.3s, transform 0.2s;
  filter: brightness(0.72) saturate(0.9);
}
.mood-strip img:hover { filter: brightness(1) saturate(1.1); transform: scale(1.02); }

/* IST / SOLL */
.ist-soll-wrap {
  grid-column: 1/-1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.ist-soll-label {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.ist-soll-label.ist { color: #aaa; }
.ist-soll-label.soll { color: #fc0; }
.ist-soll-img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  display: block;
}
.ist-soll-img.ist { border: 2px solid #444; }
.ist-soll-img.soll { border: 2px solid #fc0; }
.soll-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  border: 2px dashed #fc0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #fc0;
  font-size: 14px;
  background: rgba(255,200,0,0.04);
}
.soll-placeholder span { font-size: 32px; }
.soll-placeholder p { font-size: 12px; color: #888; text-align: center; }

/* Section divider */
.section-divider {
  grid-column: 1/-1;
  color: #555;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  border-top: 1px solid #2a2a2a;
  padding-top: 16px;
}

/* Foto thumbnails */
.foto-thumb-grid {
  grid-column: 1/-1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.foto-thumb-grid img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.15s;
  background: #222;
  border: 2px solid transparent;
}
.foto-thumb-grid img:hover { transform: scale(1.03); border-color: #444; }

/* Plant cards */
.plant-grid {
  grid-column: 1/-1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 8px;
}
.plant-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.plant-card:hover { border-color: #2e7d32; }
.plant-card-img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
  background: #1a1a1a;
}
.plant-card-body { padding: 12px 14px; }
.plant-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.plant-name { font-size: 14px; font-weight: bold; color: #fff; }
.plant-common { font-size: 12px; color: #888; margin-bottom: 4px; }
.plant-role {
  font-size: 10px;
  color: #2e7d32;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: rgba(46,125,50,0.15);
  padding: 2px 7px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 8px;
}
.plant-why { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 8px; }
.plant-ziege {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  display: inline-block;
}
.plant-ziege.sicher { background: rgba(0,180,80,0.15); color: #0c6; }
.plant-ziege.gefährdet { background: rgba(255,80,0,0.15); color: #f60; }
.plant-ziege.bedingt { background: rgba(255,200,0,0.15); color: #fc0; }
.plant-wiki-link { display: inline-block; margin-top: 8px; font-size: 12px; color: #4af; text-decoration: none; opacity: 0.8; }
.plant-wiki-link:hover { opacity: 1; text-decoration: underline; }

/* Downloads */
.download-grid {
  grid-column: 1/-1;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 8px;
}
.download-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px 16px;
  color: #ddd;
  font-size: 13px;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
  cursor: pointer;
}
.download-btn:hover { background: rgba(255,255,255,0.1); border-color: #555; color: #fff; }
.download-btn .dl-icon { font-size: 18px; }
.download-btn .dl-label { display: flex; flex-direction: column; }
.download-btn .dl-label span { font-size: 10px; color: #666; margin-top: 1px; }

/* Edit mode */
#edit-bar {
  position: fixed; top: 12px; right: 12px;
  z-index: 300;
  display: none; gap: 8px; align-items: center;
}
#edit-btn {
  background: rgba(255,200,0,0.15); border: 1.5px solid #fc0; color: #fc0;
  font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
}
#edit-btn:hover { background: rgba(255,200,0,0.3); }
#edit-status {
  background: rgba(0,0,0,0.7); color: #fc0;
  font-size: 13px; padding: 6px 14px; border-radius: 20px;
  display: none; white-space: nowrap;
}
#copy-btn {
  background: rgba(0,200,100,0.15); border: 1.5px solid #0c8; color: #0c8;
  font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
  display: none;
}
body.edit-mode { cursor: crosshair; }
body.edit-mode .marker { pointer-events: none; }
</style>
</head>

function buildMarkers() {
  const container = document.getElementById('map-container');
  const img = document.getElementById('map-img');

  function place() {
    container.querySelectorAll('.marker').forEach(m => m.remove());
    const W = img.offsetWidth, H = img.offsetHeight;

    for (const [key, pos] of Object.entries(positions)) {
      const area = areas[key];
      const x = pos.x * W;
      const y = pos.y * H;
      const isPool = key === 'POOL';
      const r = isPool ? 24 : 20;

      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width', r*2+6);
      svg.setAttribute('height', r*2+6);
      svg.style.overflow = 'visible';

      // outer glow ring
      const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
      glow.setAttribute('cx', r+3); glow.setAttribute('cy', r+3);
      glow.setAttribute('r', r+4);
      glow.setAttribute('fill', 'none');
      glow.setAttribute('stroke', area.color);
      glow.setAttribute('stroke-width', '2');
      glow.setAttribute('opacity', '0.4');

      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', r+3); circle.setAttribute('cy', r+3);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', area.color);
      circle.setAttribute('stroke', '#fff');
      circle.setAttribute('stroke-width', isPool ? '2.5' : '2');

      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', r+3); text.setAttribute('y', r+3);
      text.setAttribute('text-anchor','middle');
      text.setAttribute('dominant-baseline','central');
      text.setAttribute('fill', '#fff');
      text.setAttribute('font-size', isPool ? '11' : '13');
      text.setAttribute('font-weight','bold');
      text.setAttribute('font-family','Helvetica Neue, sans-serif');
      text.textContent = area.label;

      svg.appendChild(glow);
      svg.appendChild(circle);
      svg.appendChild(text);

      const marker = document.createElement('div');
      marker.className = 'marker';
      marker.style.left = x + 'px';
      marker.style.top = y + 'px';
      marker.appendChild(svg);
      marker.onclick = () => openModal(key);
      container.appendChild(marker);
    }
  }

  if (img.complete && img.naturalWidth > 0) place();
  else img.onload = place;
  window.addEventListener('resize', place);
}

// ---- EDIT MODE ----
const editOrder = ['POOL','1','2','3','4','5','6','7'];
let editMode = false;
let editQueue = [];

function toggleEdit() {
  if (editMode) { stopEdit(); return; }
  editMode = true;
  editQueue = [...editOrder];
  document.body.classList.add('edit-mode');
  document.getElementById('edit-btn').textContent = '✕ Abbrechen';
  document.getElementById('copy-btn').style.display = 'none';
  nextEditStep();
  document.getElementById('map-container').addEventListener('click', onEditClick);
}

function nextEditStep() {
  if (editQueue.length === 0) {
    document.getElementById('edit-status').style.display = 'block';
    document.getElementById('edit-status').textContent = '✅ Fertig! Koordinaten kopieren →';
    document.getElementById('copy-btn').style.display = 'block';
    document.getElementById('edit-btn').textContent = '✏️ Nochmal';
    document.body.classList.remove('edit-mode');
    document.getElementById('map-container').removeEventListener('click', onEditClick);
    editMode = false;
    buildMarkers();
    return;
  }
  const next = editQueue[0];
  const area = areas[next];
  document.getElementById('edit-status').style.display = 'block';
  document.getElementById('edit-status').textContent = `👆 Klick auf: ${area.title || area.label}`;
}

function onEditClick(e) {
  const img = document.getElementById('map-img');
  const rect = img.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const W = img.offsetWidth, H = img.offsetHeight;

  const key = editQueue.shift();
  positions[key] = { x: x/W, y: y/H };
  buildMarkers();
  nextEditStep();
}

function stopEdit() {
  editMode = false;
  editQueue = [];
  document.body.classList.remove('edit-mode');
  document.getElementById('edit-btn').textContent = '✏️ Positionen anpassen';
  document.getElementById('edit-status').style.display = 'none';
  document.getElementById('map-container').removeEventListener('click', onEditClick);
}

function copyCoords() {
  const img = document.getElementById('map-img');
  const W = img.naturalWidth || 2074;
  const H = img.naturalHeight || 1464;
  const out = {};
  for (const [k,v] of Object.entries(positions)) {
    out[k] = [Math.round(v.x*W), Math.round(v.y*H)];
  }
  const txt = JSON.stringify(out, null, 2);
  navigator.clipboard.writeText(txt).then(() => {
    document.getElementById('copy-btn').textContent = '✅ Kopiert!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Koordinaten kopieren', 2000);
  });
}

buildMarkers();
</script>
